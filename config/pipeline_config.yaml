# ===================================================================
#  Cassandra Time Series ML Pipeline -- Configuration
# ===================================================================
# This file mirrors the default values from src/config/settings.py.
# Override entries here or through environment variables at runtime.

cassandra:
  contact_points:
    - "127.0.0.1"
  port: 9042
  keyspace: "timeseries"
  username: null
  password: null
  ssl_enabled: false
  ssl_certfile: null
  consistency_level: "LOCAL_QUORUM"
  default_ttl_seconds: 0
  connection_timeout: 10
  request_timeout: 30
  max_connections_per_host: 8
  protocol_version: 4
  retry_policy: "default"
  dc_aware_routing: true
  local_dc: "datacenter1"

spark:
  app_name: "TimeseriesMLPipeline"
  master: "local[*]"
  executor_memory: "4g"
  executor_cores: 4
  num_executors: 2
  driver_memory: "2g"
  shuffle_partitions: 200
  default_parallelism: 8
  serializer: "org.apache.spark.serializer.KryoSerializer"
  cassandra_connection_host: null
  cassandra_connection_port: null
  extra_config: {}

model:
  prophet_params:
    changepoint_prior_scale: 0.05
    seasonality_prior_scale: 10.0
    seasonality_mode: "multiplicative"
    yearly_seasonality: true
    weekly_seasonality: true
    daily_seasonality: false
    interval_width: 0.95
  lightgbm_params:
    objective: "regression"
    metric: "rmse"
    boosting_type: "gbdt"
    num_leaves: 63
    learning_rate: 0.05
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    n_estimators: 500
    early_stopping_rounds: 50
    verbose: -1
  cross_validation_folds: 5
  train_test_split_ratio: 0.8
  feature_lag_orders: [1, 2, 3, 7, 14, 28]
  rolling_window_sizes: [7, 14, 30, 90]
  fourier_order: 5
  target_column: "value"
  date_column: "timestamp"
  series_id_column: "series_id"

forecast:
  horizon: 30
  frequency: "D"
  confidence_level: 0.95
  ensemble_method: "weighted_average"
  ensemble_weights:
    prophet: 0.4
    lightgbm: 0.4
    statsmodels: 0.2
  refit_frequency: "weekly"
  min_training_points: 60
  max_training_points: 10000

reconciliation:
  method: "mint"
  hierarchy_levels:
    - "total"
    - "region"
    - "store"
  top_down_method: "forecast_proportions"
  mint_covariance: "shrink"
  non_negative: true
